<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Entry — Home Stabilization Program</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <nav class="nav"></nav>

  <main class="page">
    <div class="page-header">
      <div class="page-header-text">
        <h2>New Counseling Entry</h2>
        <p>All fields marked with * are required.</p>
      </div>
    </div>

    <div class="card">
      <form id="entryForm">
        <div class="form-grid">

          <div class="section-title">Case &amp; Client Information</div>

          <div class="form-group">
            <label for="caseNo">Case No. *</label>
            <input type="text" id="caseNo" required>
          </div>
          <div class="form-group">
            <label for="clientName">Client Name *</label>
            <input type="text" id="clientName" required>
          </div>
          <div class="form-group">
            <label for="counselingDate">Counseling Date *</label>
            <input type="date" id="counselingDate" required>
          </div>
          <div class="form-group">
            <label for="counselor">Counselor *</label>
            <input type="text" id="counselor" required>
          </div>
          <div class="form-group">
            <label for="guarantor">Guarantor</label>
            <input type="text" id="guarantor">
          </div>
          <div class="form-group">
            <label for="zipCode">Zip Code</label>
            <input type="text" id="zipCode" maxlength="10">
          </div>

          <div class="section-title">Counseling Details</div>

          <div class="form-group">
            <label for="counselingType">Counseling Type *</label>
            <select id="counselingType" required>
              <option value="">— Select —</option>
            </select>
          </div>
          <!-- sourceMonth is derived from counselingDate automatically -->
          <select id="sourceMonth" class="hidden"></select>
          <div class="form-group">
            <label for="caseStatus">Case Status</label>
            <input type="text" id="caseStatus">
          </div>
          <div class="form-group">
            <label for="outcome">Outcome</label>
            <input type="text" id="outcome">
          </div>

          <div class="section-title">Demographics</div>

          <div class="form-group">
            <label for="amiPercent">AMI Level *</label>
            <select id="amiPercent" required>
              <option value="">— Select —</option>
            </select>
          </div>
          <div class="form-group">
            <label for="reCode">Race &amp; Ethnicity Code *</label>
            <select id="reCode" required>
              <option value="">— Select —</option>
            </select>
          </div>
          <div class="checkbox-row">
            <input type="checkbox" id="hispanic">
            <label for="hispanic">Hispanic / Latino</label>
          </div>
          <div class="checkbox-row">
            <input type="checkbox" id="femaleHeaded">
            <label for="femaleHeaded">Female-Headed Household</label>
          </div>

          <div class="section-title">Financial</div>

          <div class="form-group">
            <label for="hours">Hours *</label>
            <input type="number" id="hours" min="0" step="0.25" required>
          </div>
          <div class="form-group">
            <label for="ratePerHour">Rate per Hour ($)</label>
            <input type="number" id="ratePerHour" min="0" step="0.01">
          </div>
          <div class="form-group">
            <label for="dollarsAwarded">Outcome Value ($, computed)</label>
            <input type="number" id="dollarsAwarded" readonly>
          </div>
          <div class="form-group">
            <label for="awardType">Outcome Type</label>
            <select id="awardType">
              <option value="">— Select —</option>
            </select>
          </div>
          <div class="form-group">
            <label for="dollarsFor">Dollars For</label>
            <input type="text" id="dollarsFor">
          </div>

          <div class="section-title">Notes</div>

          <div class="form-group full-width">
            <label for="notes">Notes</label>
            <textarea id="notes" rows="4"></textarea>
          </div>

        </div>

        <p id="formError" class="error-msg hidden"></p>
        <div class="form-actions">
          <button type="submit" id="submitBtn" class="btn btn-primary">Save Entry</button>
          <a href="log.html" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </main>

  <script type="module" src="js/new-entry.js"></script>
</body>
</html>
