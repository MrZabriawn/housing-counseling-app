<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Training &amp; Certification — Home Stabilization Program</title>
  <link rel="stylesheet" href="css/app.css">
  <style>
    /* ── Tab bar ──────────────────────────────────────────── */
    .train-tabs {
      display: flex; gap: 0; flex-wrap: wrap;
      border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; width: fit-content; margin-bottom: 1.25rem;
    }
    .train-tab {
      padding: 0.45rem 1.25rem; font-size: 0.875rem; font-weight: 600;
      cursor: pointer; background: #fff; border: none;
      border-right: 1px solid var(--border); color: var(--text-muted);
      transition: background 0.12s, color 0.12s;
    }
    .train-tab:last-child { border-right: none; }
    .train-tab.active { background: var(--primary); color: #fff; }
    .train-panel { display: none; }
    .train-panel.active { display: block; }

    /* ── Status badges ────────────────────────────────────── */
    .status-bar {
      display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.25rem;
    }
    .status-chip {
      font-size: 0.72rem; font-weight: 700; padding: 0.2rem 0.6rem;
      border-radius: 20px; border: 1px solid transparent;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .status-chip.done    { background: #dcfce7; color: #166534; border-color: #86efac; }
    .status-chip.partial { background: #fef9c3; color: #854d0e; border-color: #fde047; }
    .status-chip.empty   { background: #f1f5f9; color: var(--text-muted); border-color: var(--border); }

    /* ── Section cards ────────────────────────────────────── */
    .train-section {
      border: 1px solid var(--border); border-radius: var(--radius);
      margin-bottom: 0.75rem; background: #fff; overflow: hidden;
    }
    .train-section-header {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.65rem 1rem; cursor: pointer; user-select: none;
      background: #f8f9fb; transition: background 0.1s;
    }
    .train-section-header:hover { background: #f0f1f3; }
    .train-section-title {
      font-weight: 700; font-size: 0.875rem; flex: 1;
    }
    .train-section-arrow { font-size: 0.75rem; color: var(--text-muted); transition: transform 0.15s; }
    .train-section.open .train-section-arrow { transform: rotate(90deg); }
    .train-section-body { display: none; padding: 0.9rem 1rem; border-top: 1px solid var(--border); }
    .train-section.open .train-section-body { display: block; }

    /* ── Training tables ──────────────────────────────────── */
    .train-table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; margin-bottom: 1rem; }
    .train-table:last-child { margin-bottom: 0; }
    .train-table th {
      text-align: left; padding: 0.35rem 0.5rem;
      border-bottom: 2px solid var(--border);
      font-size: 0.68rem; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--text-muted); font-weight: 700;
      white-space: nowrap;
    }
    .train-table td { padding: 0.3rem 0.4rem; border-bottom: 1px solid #f0f1f3; vertical-align: middle; }
    .train-table tr:last-child td { border-bottom: none; }
    .train-table input[type="date"] {
      width: 100%; border: 1px solid var(--border); border-radius: var(--radius);
      padding: 0.22rem 0.35rem; font-size: 0.8rem; background: #fff;
      min-width: 120px;
    }
    .train-table input[type="date"]:focus { outline: 2px solid color-mix(in srgb, var(--primary) 20%, transparent); border-color: var(--primary); }
    .row-label { font-size: 0.8125rem; color: var(--text); }
    .row-label-muted { font-size: 0.78rem; color: var(--text-muted); font-style: italic; }
    .row-group-header td {
      font-weight: 700; font-size: 0.78rem; text-transform: uppercase;
      letter-spacing: 0.04em; color: var(--primary);
      padding-top: 0.75rem; padding-bottom: 0.2rem;
      border-bottom: 1px solid var(--primary-light);
      background: #f0f4ff;
    }
    .hours-badge {
      font-size: 0.7rem; font-weight: 700; background: #f0f1f3;
      color: var(--text-muted); border-radius: 10px;
      padding: 0.1rem 0.4rem; margin-left: 0.3rem; white-space: nowrap;
    }

    /* ── Sub-section label ────────────────────────────────── */
    .subsection-label {
      font-size: 0.78rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.04em; color: var(--text-muted);
      margin: 1rem 0 0.4rem; padding-bottom: 0.25rem;
      border-bottom: 1px solid var(--border);
    }
    .subsection-label:first-child { margin-top: 0; }

    /* ── Save bar ─────────────────────────────────────────── */
    .save-bar {
      display: flex; align-items: center; gap: 0.75rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <nav class="nav"></nav>

  <main class="page">
    <div class="page-header">
      <div class="page-header-text">
        <h2>Training &amp; Certification</h2>
        <p>PHFA Counselor Work Plans</p>
      </div>
    </div>

    <!-- Tab bar — My Training always first; ED tabs injected by JS -->
    <div class="train-tabs" id="trainTabBar">
      <button class="train-tab active" data-tab="mine">My Training</button>
    </div>

    <!-- My Training panel -->
    <div class="train-panel active" id="panel-mine">
      <div id="mine-status" class="status-bar"></div>
      <div id="mine-form"></div>
      <div class="save-bar">
        <button class="btn btn-primary" id="mine-save">Save Changes</button>
        <span id="mine-msg" class="hidden" style="font-size:0.8125rem;"></span>
      </div>
    </div>

    <!-- ED counselor panels injected here by JS -->
  </main>

  <script type="module" src="js/training.js"></script>
</body>
</html>
