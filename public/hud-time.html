<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My HUD Time — Home Stabilization Program</title>
  <link rel="stylesheet" href="css/app.css">
  <style>
    /* ── Tab bar ──────────────────────────────────────────────────────── */
    .hud-tabs {
      display: flex; gap: 0;
      border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; width: fit-content; margin-bottom: 1.25rem;
    }
    .hud-tab {
      padding: 0.45rem 1.25rem; font-size: 0.875rem; font-weight: 600;
      cursor: pointer; background: #fff; border: none;
      border-right: 1px solid var(--border); color: var(--text-muted);
      transition: background 0.12s, color 0.12s;
    }
    .hud-tab:last-child { border-right: none; }
    .hud-tab.active { background: var(--primary); color: #fff; }

    /* ── Day accordion ────────────────────────────────────────────────── */
    .day-row {
      border: 1px solid var(--border); border-radius: var(--radius);
      margin-bottom: 0.4rem; background: #fff; overflow: hidden;
    }
    .day-header {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.55rem 0.9rem; cursor: pointer;
      user-select: none; transition: background 0.1s;
    }
    .day-header:hover { background: #f8f9fb; }
    .day-header.weekend { background: #fafafa; }
    .day-header.weekend .day-label { color: var(--text-muted); }
    .day-label { font-weight: 600; font-size: 0.875rem; min-width: 130px; }
    .day-hours { margin-left: auto; font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; }
    .day-arrow { font-size: 0.75rem; color: var(--text-muted); transition: transform 0.15s; }
    .day-row.open .day-arrow { transform: rotate(90deg); }

    .day-body { display: none; border-top: 1px solid var(--border); padding: 0.65rem 0.9rem; }
    .day-row.open .day-body { display: block; }

    /* Entry chip inside day body */
    .entry-chip {
      display: flex; align-items: flex-start; gap: 0.5rem;
      font-size: 0.8125rem; padding: 0.35rem 0; border-bottom: 1px solid #f0f1f3;
    }
    .entry-chip:last-of-type { border-bottom: none; }
    .entry-chip-info { flex: 1; line-height: 1.45; }
    .entry-chip-row { font-weight: 600; color: var(--text); }
    .entry-chip-desc { color: var(--text-muted); }
    .entry-chip-hrs { font-size: 0.8rem; font-weight: 700; color: var(--primary); white-space: nowrap; padding-top: 2px; }
    .entry-chip-edit {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 1rem; padding: 0.1rem 0.3rem;
      border-radius: 4px; line-height: 1; flex-shrink: 0;
    }
    .entry-chip-edit:hover { background: var(--primary-light); color: var(--primary); }
    .entry-chip-del {
      background: none; border: none; cursor: pointer;
      color: var(--danger); font-size: 1rem; padding: 0.1rem 0.3rem;
      border-radius: 4px; line-height: 1; flex-shrink: 0;
    }
    .entry-chip-del:hover { background: #fee2e2; }
    .entry-chip.derived { opacity: 0.7; }
    .derived-badge {
      font-size: 0.7rem; background: #e8f0fe; color: var(--primary);
      border-radius: 3px; padding: 0 4px; font-weight: 700;
      display: inline-block; margin-left: 4px; vertical-align: middle;
    }

    /* Inline add form inside day body */
    .add-entry-form {
      margin-top: 0.6rem; padding: 0.75rem; background: #f8f9fb;
      border: 1px solid var(--border); border-radius: var(--radius);
    }
    .section-radios { display: flex; gap: 1rem; margin-bottom: 0.6rem; flex-wrap: wrap; }
    .section-radios label {
      display: flex; align-items: center; gap: 0.35rem;
      font-size: 0.8125rem; cursor: pointer; font-weight: 500;
    }
    .add-form-row { display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: flex-end; }
    .add-form-row .form-group { margin: 0; }
    .add-form-row select, .add-form-row input[type="number"] { font-size: 0.8125rem; }
    .add-form-row textarea { font-size: 0.8125rem; min-height: 50px; resize: vertical; }
    .add-form-actions { display: flex; gap: 0.5rem; margin-top: 0.6rem; }

    /* ── Monthly summary ──────────────────────────────────────────────── */
    .summary-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 0.5rem; }
    .summary-table th {
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--text-muted); font-weight: 700; padding: 0.4rem 0.5rem;
      border-bottom: 2px solid var(--border); text-align: left;
    }
    .summary-table td { padding: 0.35rem 0.5rem; border-bottom: 1px solid #f0f1f3; }
    .summary-table tr:last-child td { border-bottom: none; font-weight: 700; background: #f8f9fb; }

    /* ── My Entries tab ───────────────────────────────────────────────── */
    #myEntriesTable { font-size: 0.85rem; }
    #myEntriesTable th { white-space: nowrap; }
  </style>
</head>
<body>
  <nav class="nav"></nav>

  <main class="page">
    <div class="page-header">
      <div class="page-header-text">
        <h2>My HUD Time</h2>
        <p>PAR log and time entry history.</p>
      </div>
      <div style="display:flex;align-items:center;gap:0.75rem;">
        <div class="form-group" style="margin:0;">
          <label for="monthPicker" style="font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted);">Month</label>
          <input type="month" id="monthPicker" style="font-size:0.875rem;">
        </div>
      </div>
    </div>

    <!-- Tab bar -->
    <div class="hud-tabs">
      <button class="hud-tab active" data-tab="par">PAR Log</button>
      <button class="hud-tab" data-tab="entries">My Entries</button>
    </div>

    <!-- PAR Log tab -->
    <div id="tabPar">
      <div id="parDayList" style="max-width:860px;">
        <p style="color:var(--text-muted);font-size:0.875rem;">Loading…</p>
      </div>

      <!-- Monthly summary -->
      <div class="card" style="max-width:500px;margin-top:1.25rem;">
        <div class="card-title">Monthly Summary</div>
        <div id="parSummary">
          <p style="color:var(--text-muted);font-size:0.875rem;">Loading…</p>
        </div>
      </div>
    </div>

    <!-- My Entries tab -->
    <div id="tabEntries" class="hidden">
      <div class="card" style="padding:0;max-width:960px;">
        <div style="overflow-x:auto;">
          <table id="myEntriesTable">
            <thead>
              <tr>
                <th>Date</th>
                <th>Section</th>
                <th>PAR Row</th>
                <th>Description</th>
                <th>Hours</th>
                <th style="width:5rem;"></th>
              </tr>
            </thead>
            <tbody id="myEntriesBody">
              <tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text-muted)">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- Edit entry modal -->
  <div id="editModal" class="modal-overlay hidden">
    <div class="modal-box">
      <h3>Edit Entry</h3>
      <div class="form-grid" style="margin-top:1rem;">
        <div class="form-group">
          <label for="editSection">Section</label>
          <select id="editSection">
            <option value="PAR-S1">Section 1 – Direct Service</option>
            <option value="PAR-S2">Section 2 – Training</option>
            <option value="PAR-S3">Section 3 – Marketing</option>
            <option value="CML">CML</option>
          </select>
        </div>
        <div class="form-group">
          <label for="editParRow">PAR Row</label>
          <select id="editParRow"></select>
        </div>
        <div class="form-group full-width">
          <label for="editDesc">Description</label>
          <textarea id="editDesc" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="editHours">Hours</label>
          <input type="number" id="editHours" min="0.25" max="24" step="0.25">
        </div>
      </div>
      <p id="editError" class="error-msg hidden"></p>
      <div class="form-actions">
        <button id="editSaveBtn" class="btn btn-primary">Save</button>
        <button id="editCancelBtn" class="btn btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Delete confirmation modal -->
  <div id="deleteModal" class="modal-overlay hidden">
    <div class="modal-box">
      <h3>Delete Entry</h3>
      <p style="font-size:0.875rem;margin:0.75rem 0;">Are you sure you want to delete this entry? This cannot be undone.</p>
      <p id="deleteModalError" class="error-msg hidden"></p>
      <div class="form-actions">
        <button id="deleteConfirmBtn" class="btn btn-danger">Delete</button>
        <button id="deleteCancelBtn" class="btn btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/hud-time.js"></script>
</body>
</html>
