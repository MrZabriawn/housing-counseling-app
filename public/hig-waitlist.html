<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIG Waitlist — Home Stabilization Program</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <nav class="nav"></nav>

  <main class="page">
    <div class="page-header">
      <div class="page-header-text">
        <h2>Home Improvement Grant Waitlist</h2>
        <p>Ranked by priority score. Lower AMI and longer wait time carry the most weight.</p>
      </div>
    </div>

    <div class="filter-bar">
      <div class="form-group">
        <label>Status</label>
        <select id="filterStatus">
          <option value="">All Statuses</option>
          <option value="waitlisted">Waitlisted</option>
          <option value="under_review">Under Review</option>
          <option value="approved">Approved</option>
          <option value="in_progress">In Progress</option>
          <option value="complete">Complete</option>
        </select>
      </div>
      <div class="form-group">
        <label>AMI Tier</label>
        <select id="filterTier">
          <option value="">All Tiers</option>
          <option value="grant">≤50% — Forgivable Grant</option>
          <option value="loan">50–80% — Forgivable Loan</option>
          <option value="sharing">80–120% — Cost-Sharing</option>
        </select>
      </div>
      <div class="form-group">
        <label>Search</label>
        <input type="text" id="filterSearch" placeholder="Client name…">
      </div>
    </div>

    <div class="card" style="padding:0;">
      <table class="data-table">
        <thead>
          <tr>
            <th style="width:2.5rem;">#</th>
            <th>Client</th>
            <th>AMI</th>
            <th>Assistance Type</th>
            <th>Est. Budget</th>
            <th>Est. Days</th>
            <th>Score</th>
            <th>Days Waiting</th>
            <th>Status</th>
            <th>Documents</th>
          </tr>
        </thead>
        <tbody id="higBody">
          <tr><td colspan="10" class="text-muted" style="padding:2rem;text-align:center;">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Edit Modal -->
  <div id="higEditModal" class="modal-overlay hidden">
    <div class="modal-box modal-box-wide">
      <h3 id="higEditTitle">Edit HIG Entry</h3>
      <div class="form-grid" style="margin-top:1rem;">
        <div class="form-group full-width">
          <label for="editHigScope">Scope of Work</label>
          <textarea id="editHigScope" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="editHigBudget">Estimated Budget ($)</label>
          <input type="number" id="editHigBudget" min="0" step="1">
        </div>
        <div class="form-group">
          <label for="editHigDays">Est. Time to Completion (days)</label>
          <input type="number" id="editHigDays" min="1" step="1">
        </div>
        <div class="form-group">
          <label for="editHigStatus">Status</label>
          <select id="editHigStatus">
            <option value="waitlisted">Waitlisted</option>
            <option value="under_review">Under Review</option>
            <option value="approved">Approved</option>
            <option value="in_progress">In Progress</option>
            <option value="complete">Complete</option>
          </select>
        </div>
        <div class="form-group full-width">
          <label>Scope of Work Document</label>
          <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;">
            <a id="editHigFileLink" href="#" target="_blank" class="btn btn-secondary btn-sm hidden">Open Document</a>
            <span id="editHigFileName" class="text-muted" style="font-size:0.8125rem;"></span>
          </div>
        </div>
        <div class="form-group full-width">
          <label>Client Drive Folder</label>
          <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;">
            <a id="editHigFolderLink" href="#" target="_blank" class="btn btn-secondary btn-sm hidden">Open Folder</a>
            <span id="editHigFolderName" class="text-muted" style="font-size:0.8125rem;"></span>
          </div>
        </div>
        <div class="form-group full-width">
          <label for="editHigNotes">Notes</label>
          <textarea id="editHigNotes" rows="2"></textarea>
        </div>
      </div>
      <p id="higEditError" class="error-msg hidden"></p>
      <div class="form-actions">
        <button id="higEditSave" class="btn btn-primary">Save</button>
        <button id="higEditCancel" class="btn btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/hig-waitlist.js"></script>
</body>
</html>
