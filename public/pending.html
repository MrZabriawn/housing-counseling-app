<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Pending — Home Stabilization Program</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="login-page">
  <div class="login-box" style="text-align:center;">
    <div class="login-logo">
      <img src="img/logo.png" alt="Housing Opportunities">
      <p>Home Stabilization Program</p>
    </div>

    <div style="margin:1.5rem 0 1rem;">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>

    <h2 style="font-size:1.2rem;font-weight:700;margin:0 0 0.5rem;">Account Pending Approval</h2>
    <p style="font-size:0.9rem;color:var(--text-muted);margin:0 0 1.5rem;line-height:1.55;">
      Your account has been created but hasn't been activated yet.<br>
      Please contact your Executive Director to get access.
    </p>

    <button id="logoutBtn" class="btn btn-secondary btn-block">Sign out</button>
  </div>

  <script type="module" src="js/pending.js"></script>
</body>
</html>
