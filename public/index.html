<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Home Stabilization Program</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <img src="img/logo.png" alt="Housing Opportunities">
      <p>Home Stabilization Program &mdash; CD255505 2419-PRO</p>
    </div>

    <p id="loginError" class="error-msg hidden"></p>
    <button id="submitBtn" class="btn btn-primary btn-block mt-2">Sign in with Google</button>
    <p class="login-hint">Use your @housingopps.org account</p>

    <div style="display:flex;align-items:center;gap:0.75rem;margin:1.25rem 0 0.75rem;">
      <hr style="flex:1;border:none;border-top:1px solid var(--border);">
      <span style="font-size:0.8rem;color:var(--text-muted);">or</span>
      <hr style="flex:1;border:none;border-top:1px solid var(--border);">
    </div>

    <p style="font-size:0.8125rem;color:var(--text-muted);margin:0 0 0.4rem;">Funder / Demo Access</p>
    <input type="password" id="demoPasscode" class="form-control" placeholder="Enter demo passcode" autocomplete="off">
    <button id="demoBtn" class="btn btn-secondary btn-block mt-1">Enter Demo Mode</button>
    <p id="demoError" class="error-msg hidden"></p>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
