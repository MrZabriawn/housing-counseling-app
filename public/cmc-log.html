<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMC Letters — Home Stabilization Program</title>
  <link rel="stylesheet" href="css/app.css">
  <style>
    /* Lender field visibility — toggled by JS based on template selection */
    #lenderGroup { transition: opacity 0.15s; }

    /* Checkbox column */
    .cb-col { width: 2rem; text-align: center; }
    input[type="checkbox"] { width: 1rem; height: 1rem; cursor: pointer; }

    /* Generate bar */
    #generateBar {
      display: none;
      align-items: center;
      gap: 1rem;
      background: var(--primary-light, #e8f0fe);
      border: 1px solid var(--primary, #2563eb);
      border-radius: var(--radius);
      padding: 0.65rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <nav class="nav"></nav>

  <main class="page">
    <div class="page-header">
      <div class="page-header-text">
        <h2>CMC Letters</h2>
        <p>Log letters sent to foreclosure clients from courthouse lists.</p>
      </div>
      <button id="logLetterBtn" class="btn btn-primary">+ Log Letter</button>
    </div>

    <!-- Stats -->
    <div class="stats-row" style="margin-bottom:1.25rem;">
      <div class="stat-card">
        <div class="stat-value" id="statTotal">—</div>
        <div class="stat-label">Letters Sent</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statLinked">—</div>
        <div class="stat-label">Became Clients</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statRate">—</div>
        <div class="stat-label">Success Rate</div>
      </div>
    </div>

    <!-- Generate bar — appears when checkboxes are selected -->
    <div id="generateBar">
      <span id="selectedCount">0 selected</span>
      <button id="generateBtn" class="btn btn-primary btn-sm">Generate Letters PDF</button>
      <button id="clearSelBtn" class="btn btn-secondary btn-sm">Clear</button>
    </div>

    <!-- Table -->
    <div class="card" style="padding:0;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:0.75rem 1.25rem;border-bottom:1px solid var(--border);">
        <span style="font-size:0.8rem;color:var(--text-muted);">Select rows to generate letters.</span>
        <label style="display:flex;align-items:center;gap:0.4rem;font-size:0.8rem;cursor:pointer;">
          <input type="checkbox" id="selectAll"> Select all
        </label>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th class="cb-col"></th>
              <th>Date Sent</th>
              <th>Name</th>
              <th>Mailing Address</th>
              <th>Property Address</th>
              <th>Template</th>
              <th>Linked Client</th>
            </tr>
          </thead>
          <tbody id="cmcTableBody">
            <tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--text-muted)">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Log Letter Modal -->
  <div id="logModal" class="modal-overlay hidden">
    <div class="modal-box modal-box-wide">
      <h3>Log CMC Letter</h3>
      <div class="form-grid" style="margin-top:0;">

        <div class="form-group">
          <label for="lDate">Date Sent *</label>
          <input type="date" id="lDate" required>
        </div>
        <div class="form-group">
          <label for="lTemplate">Template *</label>
          <select id="lTemplate">
            <option value="dan">Dan Bernabie — Beaver County</option>
            <option value="andrusa">Andrusa Lawson — Lawrence County</option>
            <option value="mercer">Mercer County</option>
          </select>
        </div>

        <div class="form-group">
          <label for="lName">Recipient Name *</label>
          <input type="text" id="lName" placeholder="First Last" required>
        </div>
        <div id="lenderGroup" class="form-group">
          <label for="lLender">Lender / Plaintiff *</label>
          <input type="text" id="lLender" placeholder="Bank of America, N.A.">
        </div>

        <div class="form-group full-width">
          <label for="lMailAddr">Mailing Address — Street *</label>
          <input type="text" id="lMailAddr" placeholder="123 Main Street">
        </div>
        <div class="form-group full-width">
          <label for="lMailAddr2">Mailing Address — City, State ZIP *</label>
          <input type="text" id="lMailAddr2" placeholder="Pittsburgh, PA 15205">
        </div>
        <div class="form-group full-width">
          <label for="lPropAddr">Property Address *</label>
          <input type="text" id="lPropAddr" placeholder="456 Oak Ave, Beaver, PA 15009">
        </div>

      </div>
      <p id="logModalError" class="error-msg hidden"></p>
      <div class="form-actions">
        <button id="logModalSave" class="btn btn-primary">Save</button>
        <button id="logModalCancel" class="btn btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/cmc-log.js"></script>
</body>
</html>
