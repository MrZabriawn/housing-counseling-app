<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Client — Home Stabilization Program</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <nav class="nav"></nav>

  <main class="page">
    <div class="page-header">
      <div class="page-header-text">
        <h2>New Client</h2>
        <p>Create a client profile and log the first session.</p>
      </div>
    </div>

    <form id="newClientForm">
      <!-- Client Info -->
      <div class="card">
        <div class="card-title">Client Information</div>
        <div class="form-grid">

          <div class="section-title">Identity</div>

          <div class="form-group">
            <label for="clientName">Client Name *</label>
            <input type="text" id="clientName" required>
          </div>
          <div class="form-group">
            <label for="counselingType">Counseling Type *</label>
            <select id="counselingType" required>
              <option value="">— Select —</option>
            </select>
          </div>
          <div class="form-group">
            <label for="counselor">Counselor *</label>
            <select id="counselor" required>
              <option value="">— Select —</option>
            </select>
          </div>
          <div class="form-group">
            <label for="guarantor">Guarantor</label>
            <input type="text" id="guarantor">
          </div>
          <div class="form-group">
            <label for="zipCode">Zip Code</label>
            <input type="text" id="zipCode" maxlength="10">
          </div>
          <div class="form-group">
            <label for="rxNumber">Rx Number</label>
            <input type="text" id="rxNumber">
          </div>

          <div class="section-title">Demographics</div>

          <div class="form-group">
            <label for="amiPercent">AMI Level *</label>
            <select id="amiPercent" required>
              <option value="">— Select —</option>
            </select>
          </div>
          <div class="form-group">
            <label for="reCode">Race &amp; Ethnicity *</label>
            <select id="reCode" required>
              <option value="">— Select —</option>
            </select>
          </div>
          <div class="checkbox-row">
            <input type="checkbox" id="hispanic">
            <label for="hispanic">Hispanic / Latino</label>
          </div>
          <div class="checkbox-row">
            <input type="checkbox" id="femaleHeaded">
            <label for="femaleHeaded">Female-Headed Household</label>
          </div>
        </div>
      </div>

      <!-- First Session -->
      <div class="card" style="margin-top:1.25rem;">
        <div class="card-title">First Session</div>
        <div class="form-grid">
          <div class="form-group">
            <label for="sessionDate">Date *</label>
            <input type="date" id="sessionDate" required>
          </div>
          <div class="form-group">
            <label for="hours">Hours</label>
            <input type="number" id="hours" min="0" step="0.25">
          </div>
          <div class="form-group">
            <label for="dollarsAwarded">Outcome Value ($)</label>
            <input type="number" id="dollarsAwarded" min="0" step="0.01">
          </div>
          <div class="form-group">
            <label for="awardType">Outcome Type</label>
            <select id="awardType">
              <option value="">— Select —</option>
            </select>
          </div>
          <div class="form-group">
            <label for="caseStatus">Case Status</label>
            <input type="text" id="caseStatus">
          </div>
          <div class="form-group">
            <label for="outcome">Outcome</label>
            <input type="text" id="outcome">
          </div>
          <div class="form-group full-width">
            <label for="notes">Notes</label>
            <textarea id="notes" rows="3"></textarea>
          </div>
        </div>
      </div>

      <p id="formError" class="error-msg hidden" style="margin-top:1rem;"></p>
      <div class="form-actions" style="margin-top:1rem;">
        <button type="submit" id="submitBtn" class="btn btn-primary">Create Client</button>
        <a href="clients.html" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </main>

  <script type="module" src="js/new-client.js"></script>
</body>
</html>
